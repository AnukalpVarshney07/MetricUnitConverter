<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pro Unit Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>⚡ Pro Unit Converter - By Anukalp Varshney</h1>

  <!-- Category -->
  <select id="category"></select>

  <!-- Converter Card -->
  <div class="card">

    <input type="number" id="inputValue" placeholder="Enter value" />

    <div class="row">
      <select id="fromUnit"></select>

      <button id="swapBtn">⇄</button>

      <select id="toUnit"></select>
    </div>

    <h2 id="result">--</h2>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
